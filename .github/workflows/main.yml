name: work-bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
concurrency:
  group: work-bot
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: state.json
          key: work-state-${{ github.run_id }}
          restore-keys: work-state-
      - name: create env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env
      - name: reply
        run: python main_reply.py
      - name: digest (KST 8-22)
        run: |
          H=$(TZ=Asia/Seoul date +%-H)
          if [ "$H" -ge 8 ] && [ "$H" -le 22 ]; then python main_digest.py; else echo "off-hours"; fi
